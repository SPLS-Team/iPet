name: Build and Release

# Borrowed the two-job (build → release) shape from SPLS-Team/XlsxSearcher, but
# adds a test gate (they skip tests) and targets Tauri/Rust instead of
# PyInstaller. Only Windows is built today — the code is portable but only
# Windows is verified; adding macOS/Linux later needs Tauri's per-OS system
# deps (webkit2gtk etc.) and is intentionally out of scope for now.
#
# - Push to master/dev/PR: build + test gate (no release).
# - Push a v* tag: build + test gate, then auto-publish a Release with the
#   NSIS installer + portable zip attached.

on:
  push:
    branches:
      - master
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install npm dependencies
        run: npm ci

      # --- Test gate: fail the run if any of these break. ---
      - name: Frontend build
        run: npm run build

      - name: Frontend tests (vitest)
        run: npm test

      - name: Rust type-check
        run: cargo check
        working-directory: src-tauri

      - name: Rust unit tests
        # --release: the debug test binary statically links the full Tauri
        # stack and trips a Windows loader bug before tests run (see CLAUDE.md).
        run: cargo test --release --lib
        working-directory: src-tauri

      # --- Build the distributable artifacts. ---
      - name: Tauri build (NSIS)
        run: npm run tauri:build

      - name: Portable zip
        run: npm run dist:zip

      - name: Locate artifacts
        id: artifacts
        shell: bash
        run: |
          # tauri build + dist:zip land under target/ (workspace root) since
          # the Cargo workspace moved the output dir up from src-tauri/target.
          setup="$(ls target/release/bundle/nsis/iPet_*_x64-setup.exe 2>/dev/null | head -1)"
          zip="$(ls target/release/bundle/zip/iPet_*_x64_portable.zip 2>/dev/null | head -1)"
          echo "setup=$setup" >> "$GITHUB_OUTPUT"
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          test -n "$setup" -a -n "$zip"
          ls -la "$setup" "$zip"

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ipet-nsis
          path: ${{ steps.artifacts.outputs.setup }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: ipet-portable-zip
          path: ${{ steps.artifacts.outputs.zip }}
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish when a v* tag is pushed — branch/PR builds stop after `build`.
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: files
        shell: bash
        run: |
          setup="$(ls artifacts/ipet-nsis/iPet_*_x64-setup.exe | head -1)"
          zip="$(ls artifacts/ipet-portable-zip/iPet_*_x64_portable.zip | head -1)"
          echo "setup=$setup" >> "$GITHUB_OUTPUT"
          echo "zip=$zip" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        shell: bash
        env:
          SETUP_PATH: ${{ steps.files.outputs.setup }}
          ZIP_PATH: ${{ steps.files.outputs.zip }}
        run: |
          tag="${GITHUB_REF_NAME#v}"
          setup_name="$(basename "$SETUP_PATH")"
          zip_name="$(basename "$ZIP_PATH")"
          {
            echo "## iPet v${tag}"
            echo
            echo "### 下载"
            echo "- \`${setup_name}\` — NSIS 安装包"
            echo "- \`${zip_name}\` — 绿色版(解压即用,需系统已装 WebView2 运行时)"
            echo
            # Human-readable changelog from the annotated tag body (the bulleted
            # feature list written when tagging). Falls back gracefully if the
            # tag is lightweight / has no body.
            tag_body="$(git tag -l --format='%(contents:body)' "$GITHUB_REF_NAME")"
            if [ -n "$tag_body" ]; then
              echo "### 本次更新"
              echo
              echo "$tag_body"
              echo
            fi
            echo "### 自上一个版本以来的提交"
            echo
            # Commits between the previous tag and this one, one-line each.
            if git rev-list --tags --skip=1 --max-count=1 >/dev/null 2>&1; then
              prev="$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)"
              range="${prev:+${prev}..}${GITHUB_REF}"
              git log --pretty=format:'- %s (%h)' "$range" 2>/dev/null || git log --pretty=format:'- %s (%h)' -15
            else
              git log --pretty=format:'- %s (%h)' -15
            fi
          } > /tmp/release_notes.md
          echo "##[group]Release notes preview"
          cat /tmp/release_notes.md
          echo "##[endgroup]"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: |
            ${{ steps.files.outputs.setup }}
            ${{ steps.files.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
