name: Build and Release

on:
  push:
    branches:
      - master
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact-setup: ipet-nsis
            artifact-zip: ipet-portable-zip
          - os: macos-latest
            platform: macos
            artifact-dmg: ipet-dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install npm dependencies
        run: npm ci

      # --- Test gate ---
      - name: Frontend build
        run: npm run build

      - name: Frontend tests (vitest)
        run: npm test

      - name: Rust type-check
        run: cargo check
        working-directory: src-tauri

      - name: Rust unit tests
        run: cargo test --release --lib
        working-directory: src-tauri

      # --- Build distributable artifacts ---
      - name: Tauri build
        run: npm run tauri:build

      # --- Windows-only: portable zip ---
      - name: Portable zip
        if: matrix.platform == 'windows'
        run: npm run dist:zip

      # --- Locate artifacts ---
      - name: Locate artifacts (Windows)
        id: artifacts-win
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          setup="$(ls target/release/bundle/nsis/iPet_*_x64-setup.exe 2>/dev/null | head -1)"
          zip="$(ls target/release/bundle/zip/iPet_*_x64_portable.zip 2>/dev/null | head -1)"
          echo "setup=$setup" >> "$GITHUB_OUTPUT"
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          test -n "$setup" -a -n "$zip"
          ls -la "$setup" "$zip"

      - name: Locate artifacts (macOS)
        id: artifacts-mac
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          dmg="$(ls target/release/bundle/dmg/iPet_*_*.dmg 2>/dev/null | head -1)"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          test -n "$dmg"
          ls -la "$dmg"

      # --- Upload artifacts ---
      - name: Upload NSIS installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ipet-windows-nsis
          path: ${{ steps.artifacts-win.outputs.setup }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload portable zip
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ipet-windows-portable-zip
          path: ${{ steps.artifacts-win.outputs.zip }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload macOS DMG
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ipet-macos-dmg
          path: ${{ steps.artifacts-mac.outputs.dmg }}
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: files
        shell: bash
        run: |
          setup="$(ls artifacts/ipet-windows-nsis/iPet_*_x64-setup.exe 2>/dev/null | head -1 || true)"
          zip="$(ls artifacts/ipet-windows-portable-zip/iPet_*_x64_portable.zip 2>/dev/null | head -1 || true)"
          dmg="$(ls artifacts/ipet-macos-dmg/iPet_*_*.dmg 2>/dev/null | head -1 || true)"
          echo "setup=$setup" >> "$GITHUB_OUTPUT"
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          ls -la "${setup:-/dev/null}" "${zip:-/dev/null}" "${dmg:-/dev/null}" 2>/dev/null || true

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          {
            echo "## iPet v${tag}"
            echo
            echo "### 下载"
            test -n "${{ steps.files.outputs.setup }}" && echo "- \`$(basename "${{ steps.files.outputs.setup }}")\` — Windows NSIS 安装包"
            test -n "${{ steps.files.outputs.zip }}" && echo "- \`$(basename "${{ steps.files.outputs.zip }}")\` — Windows 绿色版"
            test -n "${{ steps.files.outputs.dmg }}" && echo "- \`$(basename "${{ steps.files.outputs.dmg }}")\` — macOS DMG"
            echo
            tag_body="$(git tag -l --format='%(contents:body)' "$GITHUB_REF_NAME")"
            if [ -n "$tag_body" ]; then
              echo "### 本次更新"
              echo
              echo "$tag_body"
              echo
            fi
            echo "### 自上一个版本以来的提交"
            echo
            if git rev-list --tags --skip=1 --max-count=1 >/dev/null 2>&1; then
              prev="$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)"
              range="${prev:+${prev}..}${GITHUB_REF}"
              git log --pretty=format:'- %s (%h)' "$range" 2>/dev/null || git log --pretty=format:'- %s (%h)' -15
            else
              git log --pretty=format:'- %s (%h)' -15
            fi
          } > /tmp/release_notes.md
          echo "##[group]Release notes preview"
          cat /tmp/release_notes.md
          echo "##[endgroup]"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: |
            ${{ steps.files.outputs.setup }}
            ${{ steps.files.outputs.zip }}
            ${{ steps.files.outputs.dmg }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
