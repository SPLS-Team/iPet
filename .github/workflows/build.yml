name: Build and Release

# Two-job shape (build ŌåÆ release). The build job is a platform matrix
# (Windows + macOS); only Windows is verified locally, macOS is built in CI.
# `tauri build` only emits the targets relevant to its runner, so listing both
# `nsis` and `dmg` in tauri.conf.json is harmless per-platform.
#
# Triggers (deliberately minimal to avoid duplicate runs):
# - Pull request against master/dev ŌåÆ build + test gate (merge gate, no release).
# - Push a v* tag ŌåÆ build + test gate, then auto-publish a Release with the
#   NSIS installer + portable zip (Windows) and DMG (macOS) attached.
# - Manual dispatch (workflow_dispatch) ŌåÆ build + test gate.
#
# We do NOT trigger on plain pushes to master/dev. A merged PR already ran the
# same build as the merge gate, so re-running on the post-merge push would be a
# duplicate. The only push event that fires is a `v*` tag (for releases). If you
# ever want a fresh build of master without a PR, use workflow_dispatch.

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install npm dependencies
        run: npm ci

      # --- Test gate: fail the run if any of these break. ---
      - name: Frontend build
        run: npm run build

      - name: Frontend tests (vitest)
        run: npm test

      - name: Rust type-check
        run: cargo check
        working-directory: src-tauri

      - name: Rust unit tests
        # --release: the debug test binary statically links the full Tauri
        # stack and trips a Windows loader bug before tests run (see CLAUDE.md).
        run: cargo test --release --lib
        working-directory: src-tauri

      # --- Build the distributable artifacts. ---
      # macOS uses the tauri.macos.conf.json overlay so the window gets native
      # traffic-lights (decorations + titleBarStyle "Overlay"); Windows/Linux
      # stay frameless via the base config's `decorations: false`.
      - name: Tauri build (Windows)
        if: matrix.platform == 'windows'
        run: npm run tauri:build

      - name: Tauri build (macOS)
        if: matrix.platform == 'macos'
        run: npm run tauri -- build --config src-tauri/tauri.macos.conf.json

      # --- Windows-only: portable zip ---
      - name: Portable zip
        if: matrix.platform == 'windows'
        run: npm run dist:zip

      # --- Locate artifacts ---
      - name: Locate artifacts (Windows)
        id: artifacts-win
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # tauri build + dist:zip land under target/ (workspace root) since
          # the Cargo workspace moved the output dir up from src-tauri/target.
          setup="$(ls target/release/bundle/nsis/iPet_*_x64-setup.exe 2>/dev/null | head -1)"
          zip="$(ls target/release/bundle/zip/iPet_*_x64_portable.zip 2>/dev/null | head -1)"
          echo "setup=$setup" >> "$GITHUB_OUTPUT"
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          test -n "$setup" -a -n "$zip"
          ls -la "$setup" "$zip"

      - name: Locate artifacts (macOS)
        id: artifacts-mac
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          dmg="$(ls target/release/bundle/dmg/iPet_*_*.dmg 2>/dev/null | head -1)"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          test -n "$dmg"
          ls -la "$dmg"

      # --- Upload artifacts ---
      - name: Upload NSIS installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ipet-windows-nsis
          path: ${{ steps.artifacts-win.outputs.setup }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload portable zip
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ipet-windows-portable-zip
          path: ${{ steps.artifacts-win.outputs.zip }}
          retention-days: 14
          if-no-files-found: error

      - name: Upload macOS DMG
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ipet-macos-dmg
          path: ${{ steps.artifacts-mac.outputs.dmg }}
          retention-days: 14
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish when a v* tag is pushed ŌĆö branch/PR builds stop after `build`.
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        id: files
        shell: bash
        run: |
          setup="$(ls artifacts/ipet-windows-nsis/iPet_*_x64-setup.exe 2>/dev/null | head -1 || true)"
          zip="$(ls artifacts/ipet-windows-portable-zip/iPet_*_x64_portable.zip 2>/dev/null | head -1 || true)"
          dmg="$(ls artifacts/ipet-macos-dmg/iPet_*_*.dmg 2>/dev/null | head -1 || true)"
          echo "setup=$setup" >> "$GITHUB_OUTPUT"
          echo "zip=$zip" >> "$GITHUB_OUTPUT"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          ls -la "${setup:-/dev/null}" "${zip:-/dev/null}" "${dmg:-/dev/null}" 2>/dev/null || true

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          {
            echo "## iPet v${tag}"
            echo
            echo "### õĖŗĶĮĮ"
            test -n "${{ steps.files.outputs.setup }}" && echo "- \`$(basename "${{ steps.files.outputs.setup }}")\` ŌĆö Windows NSIS Õ«ēĶŻģÕīģ"
            test -n "${{ steps.files.outputs.zip }}" && echo "- \`$(basename "${{ steps.files.outputs.zip }}")\` ŌĆö Windows ń╗┐Ķē▓ńēł(Ķ¦ŻÕÄŗÕŹ│ńö©,ķ£Ćń│╗ń╗¤ÕĘ▓ĶŻģ WebView2 Ķ┐ÉĶĪīµŚČ)"
            test -n "${{ steps.files.outputs.dmg }}" && echo "- \`$(basename "${{ steps.files.outputs.dmg }}")\` ŌĆö macOS DMG"
            echo
          } > /tmp/release_notes.md

          # Human-readable changelog from the annotated tag body (the bulleted
          # feature list written when tagging). Falls back gracefully if the
          # tag is lightweight / has no body.
          #
          # IMPORTANT: do NOT capture the tag body into a shell variable via
          # $(...). A tag body containing backticks (e.g. `crate names`,
          # `spawn_blocking`) gets re-evaluated as command substitution when the
          # variable is later echoed, corrupting the notes. Instead write git's
          # raw output straight to a file and `cat` it ŌĆö the body never passes
          # through a second shell evaluation, so backticks stay literal.
          git tag -l --format='%(contents:body)' "$GITHUB_REF_NAME" > /tmp/tag_body.txt
          if [ -s /tmp/tag_body.txt ]; then
            {
              echo "### µ£¼µ¼Īµø┤µ¢░"
              echo
              cat /tmp/tag_body.txt
              echo
            } >> /tmp/release_notes.md
          fi

          {
            echo "### Ķć¬õĖŖõĖĆõĖ¬ńēłµ£¼õ╗źµØźńÜäµÅÉõ║ż"
            echo
            # Commits between the previous tag and this one, one-line each.
            if git rev-list --tags --skip=1 --max-count=1 >/dev/null 2>&1; then
              prev="$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)"
              range="${prev:+${prev}..}${GITHUB_REF}"
              git log --pretty=format:'- %s (%h)' "$range" 2>/dev/null || git log --pretty=format:'- %s (%h)' -15
            else
              git log --pretty=format:'- %s (%h)' -15
            fi
          } >> /tmp/release_notes.md

          echo "##[group]Release notes preview"
          cat /tmp/release_notes.md
          echo "##[endgroup]"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: |
            ${{ steps.files.outputs.setup }}
            ${{ steps.files.outputs.zip }}
            ${{ steps.files.outputs.dmg }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
